services:
  - type: web
    name: pixel-room-chat-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: CLIENT_URL
        sync: false

  - type: web
    name: pixel-room-chat-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist
    plan: free
    envVars:
      - key: VITE_SERVER_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
